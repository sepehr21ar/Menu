<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت‌نام - منوساز</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">منوساز</a>
    <nav class="nav" id="nav-auth"></nav>
  </header>

  <main>
    <section class="auth-panel">
      <h1>ساخت حساب رستوران</h1>
      <form id="signup-form" class="stack">
        <label>نام رستوران
          <input type="text" name="restaurant_name" autocomplete="organization" required>
        </label>
        <label>ایمیل
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>رمز عبور
          <input type="password" name="password" autocomplete="new-password" required minlength="6">
        </label>
        <button class="button" type="submit">ثبت‌نام</button>
      </form>
    </section>
  </main>

  <script src="/static/app.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearFormMessage(event.target);
      setLoading(event.target, true, 'در حال ساخت حساب...');
      try {
        await apiFetch('/api/signup', { method: 'POST', body: new FormData(event.target) });
        showToast('حساب ساخته شد.');
        window.location.href = '/frontend/dashboard.html';
      } catch (error) {
        setFormMessage(event.target, error.message, 'error');
      } finally {
        setLoading(event.target, false);
      }
    });
  </script>
</body>
</html>
