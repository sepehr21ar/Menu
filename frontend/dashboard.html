<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>داشبورد - منوساز</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">منوساز</a>
    <nav class="nav" id="nav-auth"></nav>
  </header>

  <main>
    <section class="page-header">
      <h1>منوهای من</h1>
      <form id="new-menu-form" class="inline-form">
        <input name="title" placeholder="نام منو" required>
        <input name="currency" placeholder="تومان" value="تومان" aria-label="واحد پول">
        <button class="button" type="submit">ساخت منو</button>
      </form>
    </section>
    <section class="menu-grid" id="menus-container"></section>
  </main>

  <script src="/static/app.js"></script>
  <script>
    const menusContainer = document.getElementById('menus-container');

    function renderMenus(menus) {
      if (!menus.length) {
        menusContainer.innerHTML = '<div class="empty-state">هنوز منویی ندارید. اولین منو را بسازید.</div>';
        return;
      }

      menusContainer.innerHTML = menus.map((menu) => `
        <article class="menu-card">
          <div>
            <h2>${escapeHtml(menu.title)}</h2>
            <p>${menu.is_published ? 'منتشر شده' : 'مخفی'} · ${escapeHtml(menu.currency)}</p>
          </div>
          <img class="qr-thumb" src="/api/menus/${menu.id}/qr" alt="کد QR برای ${escapeHtml(menu.title)}">
          <div class="card-actions">
            <a class="button small" href="/frontend/edit_menu.html?id=${menu.id}">ویرایش</a>
            <a class="button small ghost" href="/m/${menu.slug}" target="_blank" rel="noreferrer">مشاهده</a>
          </div>
        </article>
      `).join('');
    }

    async function loadMenus() {
      try {
        menusContainer.innerHTML = '<div class="empty-state">در حال بارگذاری منوها...</div>';
        renderMenus(await apiFetch('/api/menus'));
      } catch (error) {
        if (error.message === 'وارد حساب نشده‌اید.' || error.message === 'Not authenticated') {
          window.location.href = '/frontend/login.html';
          return;
        }
        menusContainer.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
      }
    }

    document.getElementById('new-menu-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      clearFormMessage(event.target);
      setLoading(event.target, true, 'در حال ساخت...');
      try {
        await apiFetch('/api/menus', { method: 'POST', body: new FormData(event.target) });
        event.target.reset();
        event.target.currency.value = 'تومان';
        showToast('منو ساخته شد.');
        await loadMenus();
      } catch (error) {
        setFormMessage(event.target, error.message, 'error');
      } finally {
        setLoading(event.target, false);
      }
    });

    loadMenus();
  </script>
</body>
</html>
