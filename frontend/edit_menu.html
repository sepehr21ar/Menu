<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ویرایش منو - منوساز</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">منوساز</a>
    <nav class="nav" id="nav-auth"></nav>
  </header>

  <main id="edit-content">
    <section class="empty-state">در حال بارگذاری منو...</section>
  </main>

  <script src="/static/app.js"></script>
  <script>
    const menuId = new URLSearchParams(window.location.search).get('id');
    const editContent = document.getElementById('edit-content');
    let currentMenu = null;

    function renderItems(category) {
      if (!category.items.length) {
        return '<p class="muted">هنوز آیتمی در این دسته‌بندی نیست. اگر عکسی نگذارید، جای خالی تمیز نمایش داده می‌شود.</p>';
      }

      return `
        <div class="items">
          ${category.items.map((item) => `
            <div class="item-row">
              <div class="item-image-frame">
                ${item.image_path ? `<img src="${item.image_path}" alt="${escapeHtml(item.name)}">` : '<div class="image-placeholder">بدون عکس</div>'}
              </div>
              <div class="item-copy">
                <strong>${escapeHtml(item.name)}</strong>
                <span>${escapeHtml(item.details || '')}</span>
              </div>
              <span class="price">${escapeHtml(currentMenu.currency)} ${escapeHtml(item.price)}</span>
              <button class="danger-link" type="button" data-delete-item="${item.id}">حذف</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderEditor(menu) {
      const publicUrl = publicMenuUrl(menu);
      editContent.innerHTML = `
        <section class="editor-header">
          <div>
            <p class="eyebrow">ویرایش منو</p>
            <h1>${escapeHtml(menu.title)}</h1>
          </div>
          <a class="button ghost" href="/frontend/dashboard.html">بازگشت</a>
        </section>

        <section class="share-panel">
          <div class="qr-box">
            <img src="/api/menus/${menu.id}/qr" alt="کد QR">
            <span>کد QR مهمان</span>
          </div>
          <div class="share-link">
            <span>لینک عمومی</span>
            <a class="public-link" href="${publicUrl}" target="_blank" rel="noreferrer">${publicUrl}</a>
          </div>
        </section>

        <section class="settings-band">
          <form id="settings-form" class="settings-form">
            <label>عنوان
              <input name="title" value="${escapeHtml(menu.title)}" required>
            </label>
            <label>واحد پول
              <input name="currency" value="${escapeHtml(menu.currency)}" required>
            </label>
            <label>عکس پس‌زمینه
              <input name="background_image" type="file" accept="image/*">
            </label>
            <label class="check-row">
              <input type="checkbox" name="is_published" ${menu.is_published ? 'checked' : ''}>
              منتشر شود
            </label>
            <button class="button" type="submit">ذخیره</button>
          </form>
        </section>

        <section class="add-category">
          <form id="category-form" class="inline-form">
            <input name="name" placeholder="نام دسته‌بندی جدید" required>
            <input name="image" type="file" accept="image/*" aria-label="عکس دسته‌بندی">
            <button class="button" type="submit">افزودن دسته‌بندی</button>
          </form>
        </section>

        <section class="category-list">
          ${menu.categories.map((category) => `
            <article class="category-panel">
              <div class="category-title">
                <div class="category-heading">
                  <div class="category-cover">
                    ${category.image_path ? `<img src="${category.image_path}" alt="${escapeHtml(category.name)}">` : '<div class="category-cover-placeholder">بدون عکس</div>'}
                  </div>
                  <h2>${escapeHtml(category.name)}</h2>
                </div>
                <button class="danger-link" type="button" data-delete-category="${category.id}">حذف دسته‌بندی</button>
              </div>
              ${renderItems(category)}
              <form class="item-form" data-category-id="${category.id}">
                <input name="name" placeholder="نام آیتم" required>
                <input name="price" placeholder="قیمت" required>
                <textarea name="details" placeholder="توضیحات"></textarea>
                <input name="image" type="file" accept="image/*" aria-label="عکس آیتم">
                <button class="button" type="submit">افزودن آیتم</button>
              </form>
            </article>
          `).join('') || '<div class="empty-state">هنوز دسته‌بندی ندارید. یکی اضافه کنید.</div>'}
        </section>
      `;
      bindEditorEvents();
    }

    function bindEditorEvents() {
      document.getElementById('settings-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        clearFormMessage(event.target);
        setLoading(event.target, true, 'در حال ذخیره...');
        const formData = new FormData(event.target);
        formData.set('is_published', event.target.is_published.checked ? 'true' : 'false');
        try {
          await apiFetch(`/api/menus/${menuId}`, { method: 'PUT', body: formData });
          showToast('تنظیمات منو ذخیره شد.');
          await loadEditMenu();
        } catch (error) {
          setFormMessage(event.target, error.message, 'error');
        } finally {
          setLoading(event.target, false);
        }
      });

      document.getElementById('category-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        clearFormMessage(event.target);
        setLoading(event.target, true, 'در حال افزودن...');
        try {
          await apiFetch(`/api/menus/${menuId}/categories`, { method: 'POST', body: new FormData(event.target) });
          showToast('دسته‌بندی اضافه شد.');
          await loadEditMenu();
        } catch (error) {
          setFormMessage(event.target, error.message, 'error');
        } finally {
          setLoading(event.target, false);
        }
      });

      document.querySelectorAll('.item-form').forEach((form) => {
        form.addEventListener('submit', async (event) => {
          event.preventDefault();
          clearFormMessage(form);
          setLoading(form, true, 'در حال افزودن...');
          try {
            await apiFetch(`/api/categories/${form.dataset.categoryId}/items`, { method: 'POST', body: new FormData(form) });
            showToast('آیتم اضافه شد.');
            await loadEditMenu();
          } catch (error) {
            setFormMessage(form, error.message, 'error');
          } finally {
            setLoading(form, false);
          }
        });
      });

      document.querySelectorAll('[data-delete-category]').forEach((button) => {
        button.addEventListener('click', async () => {
          button.disabled = true;
          try {
            await apiFetch(`/api/categories/${button.dataset.deleteCategory}`, { method: 'DELETE' });
            showToast('دسته‌بندی حذف شد.', 'info');
            await loadEditMenu();
          } catch (error) {
            showToast(error.message, 'error');
            button.disabled = false;
          }
        });
      });

      document.querySelectorAll('[data-delete-item]').forEach((button) => {
        button.addEventListener('click', async () => {
          button.disabled = true;
          try {
            await apiFetch(`/api/items/${button.dataset.deleteItem}`, { method: 'DELETE' });
            showToast('آیتم حذف شد.', 'info');
            await loadEditMenu();
          } catch (error) {
            showToast(error.message, 'error');
            button.disabled = false;
          }
        });
      });
    }

    async function loadEditMenu() {
      if (!menuId) {
        editContent.innerHTML = '<section class="empty-state">شناسه منو پیدا نشد.</section>';
        return;
      }

      try {
        currentMenu = await apiFetch(`/api/menus/${menuId}`);
        renderEditor(currentMenu);
      } catch (error) {
        editContent.innerHTML = `<section class="empty-state">${escapeHtml(error.message)}</section>`;
      }
    }

    loadEditMenu();
  </script>
</body>
</html>
