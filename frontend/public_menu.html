<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="menu-title">منو</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="public-body">
  <main class="public-menu" id="menu-content">
    <section class="empty-state">در حال بارگذاری منو...</section>
  </main>

  <script src="/static/app.js"></script>
  <script>
    const menuContent = document.getElementById('menu-content');
    let currentMenu = null;
    let currentSlug = '';
    let cartCounts = {};

    function formatPrice(value) {
      const raw = String(value || '').trim();
      const numeric = raw.replace(/[^\d.]/g, '');
      if (!numeric) return raw;

      const [whole, decimal] = numeric.split('.');
      const grouped = Number(whole).toLocaleString('en-US');
      return decimal ? `${grouped}.${decimal}` : grouped;
    }

    function parsePriceAmount(value) {
      const numeric = String(value || '').replace(/[^\d.]/g, '');
      return Number.parseFloat(numeric) || 0;
    }

    function cartStorageKey(slug) {
      return `public-order:${slug}`;
    }

    function loadCart(slug) {
      try {
        const parsed = JSON.parse(localStorage.getItem(cartStorageKey(slug)) || '{}');
        return Object.fromEntries(
          Object.entries(parsed)
            .map(([itemId, count]) => [itemId, Math.max(0, Number.parseInt(count, 10) || 0)])
            .filter(([, count]) => count > 0)
        );
      } catch (error) {
        return {};
      }
    }

    function saveCart() {
      localStorage.setItem(cartStorageKey(currentSlug), JSON.stringify(cartCounts));
    }

    function getItemCount(itemId) {
      return cartCounts[String(itemId)] || 0;
    }

    function getAvailableCategories(menu) {
      return menu.categories.map((category) => ({
        ...category,
        items: category.items.filter((item) => item.is_available),
      }));
    }

    function getAvailableItems(menu) {
      return getAvailableCategories(menu).flatMap((category) => category.items);
    }

    function cartTotalCount() {
      return Object.values(cartCounts).reduce((sum, count) => sum + count, 0);
    }

    function updateFloatingOrderButton() {
      const countBadge = document.getElementById('floating-order-count');
      const totalBadge = document.getElementById('floating-order-total');
      if (!countBadge || !totalBadge || !currentMenu) return;

      const itemsById = new Map(getAvailableItems(currentMenu).map((item) => [String(item.id), item]));
      const total = Object.entries(cartCounts).reduce((sum, [itemId, count]) => {
        const item = itemsById.get(itemId);
        return item ? sum + parsePriceAmount(item.price) * count : sum;
      }, 0);

      countBadge.textContent = cartTotalCount();
      totalBadge.textContent = `${currentMenu.currency} ${formatPrice(total.toFixed(total % 1 ? 2 : 0))}`;
    }

    function changeItemCount(itemId, delta) {
      const key = String(itemId);
      const nextCount = Math.max(0, getItemCount(key) + delta);
      if (nextCount) {
        cartCounts[key] = nextCount;
      } else {
        delete cartCounts[key];
      }

      saveCart();
      document.querySelectorAll(`[data-count-for="${key}"]`).forEach((element) => {
        element.textContent = nextCount;
      });
      document.querySelectorAll(`[data-decrease-for="${key}"]`).forEach((button) => {
        button.disabled = nextCount === 0;
      });
      updateFloatingOrderButton();
    }

    function bindOrderControls({ rerenderOrder = false } = {}) {
      menuContent.onclick = (event) => {
        const button = event.target.closest('[data-cart-action]');
        if (!button) return;

        const delta = button.dataset.cartAction === 'increase' ? 1 : -1;
        changeItemCount(button.dataset.itemId, delta);
        if (rerenderOrder) renderOrderPage(currentMenu);
      };
    }

    function floatingOrderButton(menu, label = 'Order') {
      return `
        <a class="floating-order-button" href="/m/${menu.slug}/order" aria-label="View order">
          <span>${label}</span>
          <span class="floating-order-count" id="floating-order-count">0</span>
          <strong id="floating-order-total">${escapeHtml(menu.currency)} 0</strong>
        </a>
      `;
    }

    function itemMarkup(menu, item) {
      const count = getItemCount(item.id);
      return `
        <article class="public-item">
          <div class="public-item-image-frame">
            ${item.image_path ? `<img src="${item.image_path}" alt="${escapeHtml(item.name)}">` : '<div class="image-placeholder public-placeholder">بدون عکس</div>'}
          </div>
          <div>
            <div class="public-item-title">
              <h3>${escapeHtml(item.name)}</h3>
              <strong>${escapeHtml(menu.currency)} ${escapeHtml(formatPrice(item.price))}</strong>
            </div>
            ${item.details ? `<p>${escapeHtml(item.details)}</p>` : ''}
            <div class="public-item-actions">
              <button class="quantity-button" type="button" data-cart-action="decrease" data-item-id="${item.id}" data-decrease-for="${item.id}" ${count ? '' : 'disabled'} aria-label="Remove ${escapeHtml(item.name)}">-</button>
              <span class="quantity-count" data-count-for="${item.id}">${count}</span>
              <button class="quantity-button" type="button" data-cart-action="increase" data-item-id="${item.id}" aria-label="Add ${escapeHtml(item.name)}">+</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderPublicMenu(menu) {
      document.title = `${menu.title} - منو`;
      document.body.style.backgroundImage = menu.background_image_path
        ? `linear-gradient(180deg, rgba(20, 28, 24, 0.32), rgba(20, 28, 24, 0.38)), url("${menu.background_image_path}")`
        : '';
      const availableCategories = getAvailableCategories(menu);

      menuContent.innerHTML = `
        ${floatingOrderButton(menu)}
        <header class="public-header">
          <a class="other-menus-link" href="/r/${menu.owner_id}">منوهای دیگر</a>
          <p class="restaurant-name">${escapeHtml(menu.restaurant_name)}</p>
          <h1>${escapeHtml(menu.title)}</h1>
        </header>
        ${availableCategories.length ? `
          <nav class="category-tabs">
            ${availableCategories.map((category, index) => `
              <a class="category-tab ${index === 0 ? 'active' : ''}" href="#category-${category.id}">${escapeHtml(category.name)}</a>
            `).join('')}
          </nav>
        ` : ''}
        ${availableCategories.map((category) => `
          <section class="public-category" id="category-${category.id}">
            <div class="public-category-heading">
              <div class="public-category-image">
                ${category.image_path ? `<img src="${category.image_path}" alt="${escapeHtml(category.name)}">` : '<div class="category-cover-placeholder">بدون عکس</div>'}
              </div>
              <h2>${escapeHtml(category.name)}</h2>
            </div>
            <div class="public-items">
              ${category.items.length ? category.items.map((item) => itemMarkup(menu, item)).join('') : '<p class="muted">هنوز آیتمی برای نمایش وجود ندارد.</p>'}
            </div>
          </section>
        `).join('') || '<section class="empty-state">این منو هنوز دسته‌بندی ندارد.</section>'}
        <footer class="public-footer">
          <a class="github-link" href="https://github.com/sepehr21ar/Menu" target="_blank" rel="noreferrer">گیت‌هاب · sepehr21ar/Menu</a>
          <a class="make-menu-link" href="/">منوی خودت را بساز</a>
        </footer>
      `;
      bindCategoryTabs();
      bindOrderControls();
      updateFloatingOrderButton();
    }

    function orderItemMarkup(menu, item, count) {
      const itemTotal = parsePriceAmount(item.price) * count;
      return `
        <article class="order-item">
          <div class="order-item-image-frame">
            ${item.image_path ? `<img src="${item.image_path}" alt="${escapeHtml(item.name)}">` : '<div class="image-placeholder public-placeholder">No image</div>'}
          </div>
          <div class="order-item-copy">
            <h3>${escapeHtml(item.name)}</h3>
            <p>${escapeHtml(menu.currency)} ${escapeHtml(formatPrice(item.price))}</p>
          </div>
          <div class="order-item-controls">
            <div class="order-item-meta">
              <span>${escapeHtml(menu.currency)} ${escapeHtml(formatPrice(item.price))}</span>
              <span class="order-item-divider" aria-hidden="true"></span>
              <span>Count ${count}</span>
            </div>
            <div class="public-item-actions">
              <button class="quantity-button" type="button" data-cart-action="decrease" data-item-id="${item.id}" data-decrease-for="${item.id}" aria-label="Remove ${escapeHtml(item.name)}">-</button>
              <span class="quantity-count" data-count-for="${item.id}">${count}</span>
              <button class="quantity-button" type="button" data-cart-action="increase" data-item-id="${item.id}" aria-label="Add ${escapeHtml(item.name)}">+</button>
            </div>
          </div>
          <strong class="order-item-total">${escapeHtml(menu.currency)} ${escapeHtml(formatPrice(itemTotal.toFixed(itemTotal % 1 ? 2 : 0)))}</strong>
        </article>
      `;
    }

    function renderOrderPage(menu) {
      document.title = `Order - ${menu.title}`;
      const itemsById = new Map(getAvailableItems(menu).map((item) => [String(item.id), item]));
      const selectedItems = Object.entries(cartCounts)
        .map(([itemId, count]) => ({ item: itemsById.get(itemId), count }))
        .filter(({ item, count }) => item && count > 0);
      const finalTotal = selectedItems.reduce((sum, { item, count }) => (
        sum + parsePriceAmount(item.price) * count
      ), 0);

      menuContent.innerHTML = `
        ${floatingOrderButton(menu)}
        <header class="public-header order-header">
          <a class="other-menus-link" href="/m/${menu.slug}">Back to menu</a>
          <p class="restaurant-name">${escapeHtml(menu.restaurant_name)}</p>
          <h1>Order</h1>
        </header>
        <section class="order-page">
          ${selectedItems.length ? `
            <div class="order-list">
              ${selectedItems.map(({ item, count }) => orderItemMarkup(menu, item, count)).join('')}
            </div>
            <div class="order-total">
              <span>Final pay</span>
              <strong>${escapeHtml(menu.currency)} ${escapeHtml(formatPrice(finalTotal.toFixed(finalTotal % 1 ? 2 : 0)))}</strong>
            </div>
          ` : `
            <section class="empty-state order-empty">
              Your order is empty. Go back to the menu and add items with +.
            </section>
          `}
        </section>
      `;
      bindOrderControls({ rerenderOrder: true });
      updateFloatingOrderButton();
    }

    function setActiveCategory(categoryId) {
      document.querySelectorAll('.category-tab').forEach((tab) => {
        tab.classList.toggle('active', tab.getAttribute('href') === `#${categoryId}`);
      });
    }

    function bindCategoryTabs() {
      const tabs = Array.from(document.querySelectorAll('.category-tab'));
      const sections = Array.from(document.querySelectorAll('.public-category'));
      if (!tabs.length || !sections.length) return;

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          const categoryId = tab.getAttribute('href').slice(1);
          setActiveCategory(categoryId);
        });
      });

      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (visible) setActiveCategory(visible.target.id);
      }, {
        rootMargin: '-20% 0px -65% 0px',
        threshold: [0.15, 0.4, 0.7],
      });

      sections.forEach((section) => observer.observe(section));
    }

    async function loadMenu() {
      const pathAfterMenu = location.pathname.split('/m/')[1] || '';
      const [slug, page] = pathAfterMenu.split('/');
      if (!slug) {
        menuContent.innerHTML = '<section class="empty-state">منو پیدا نشد.</section>';
        return;
      }

      try {
        currentSlug = slug;
        cartCounts = loadCart(slug);
        currentMenu = await apiFetch(`/api/m/${slug}`);
        if (page === 'order') {
          renderOrderPage(currentMenu);
          return;
        }
        renderPublicMenu(currentMenu);
      } catch (error) {
        menuContent.innerHTML = `<section class="empty-state">${escapeHtml(error.message)}</section>`;
      }
    }

    loadMenu();
  </script>
</body>
</html>
